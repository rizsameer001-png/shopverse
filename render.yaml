# ───────────────────────────────────────────────────────────────
# render.yaml — ShopVerse Infrastructure as Code
# ───────────────────────────────────────────────────────────────

services:

  # ── Backend API (Server) ─────────────────────────────────────
  - type: web
    name: shopverse-server
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    plan: free
    region: singapore
    branch: main
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: CLIENT_URL
        value: https://shopverse-client.onrender.com

      - key: ADMIN_URL
        value: https://shopverse-admin-9t5r.onrender.com

      # ── Database ─────────────────────────────────────────────
      - key: MONGO_URI
        value: mongodb+srv://rizsameer001_db_user:apyzUNvvS0p0318K@cluster0.xbnnnsq.mongodb.net/shopverse

      # JWT Auth
      - key: JWT_SECRET
        value: 9d7f3a2b8c4e1f6a5d0b9c7e3f2a1d8c6e4f5b7a

      - key: JWT_EXPIRE
        value: 30d

      - key: JWT_COOKIE_EXPIRE
        value: 30


  # ── Admin Dashboard ──────────────────────────────────────────
  - type: web
    name: shopverse-admin
    runtime: docker
    dockerfilePath: ./admin/Dockerfile
    dockerContext: ./admin
    plan: free
    region: singapore
    branch: main
    autoDeploy: true

    envVars:
      - key: VITE_API_URL
        value: https://shopverse-server-sfvj.onrender.com/api/v1


  # ── Client Frontend (Customer Store) ─────────────────────────
  - type: web
    name: shopverse-client
    runtime: docker
    dockerfilePath: ./client/Dockerfile
    dockerContext: ./client
    plan: free
    region: singapore
    branch: main
    autoDeploy: true

    envVars:
      - key: VITE_API_URL
        value: https://shopverse-server-sfvj.onrender.com/api/v1