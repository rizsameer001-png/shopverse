version: "3.9"

# ─────────────────────────────────────────────────────────────────
#  ShopVerse — Docker Compose (local development)
#
#  Services:
#    mongo   → MongoDB 7 (local DB with persistent volume)
#    server  → Spring Boot REST API  → http://localhost:8080
#    client  → React/Vite store     → http://localhost:3000
#    admin   → React admin panel    → http://localhost:3001
#
#  Commands:
#    docker compose up --build        start all (rebuild images)
#    docker compose up -d             start in background
#    docker compose logs -f server    follow backend logs
#    docker compose down              stop everything
#    docker compose down -v           stop + wipe DB volume
# ─────────────────────────────────────────────────────────────────

services:

  # ── MongoDB ───────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: shopverse-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: shopverse
    volumes:
      - mongo_data:/data/db
    networks:
      - shopverse-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s


  # ── Spring Boot Backend (Server API) ──────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: shopverse-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Use docker service hostname
      MONGODB_URI: mongodb://admin:password123@mongo:27017/shopverse?authSource=admin

      JWT_SECRET: local-dev-secret-CHANGE-in-production-min-32-chars
      JWT_EXPIRATION: 86400000

      CLIENT_URL: http://localhost:3000
      ADMIN_URL: http://localhost:3001

      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - shopverse-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s


  # ── Client Store Frontend ─────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    container_name: shopverse-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - shopverse-net


  # ── Admin Dashboard ───────────────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    container_name: shopverse-admin
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - shopverse-net


# ── Volumes ─────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local


# ── Networks ────────────────────────────────────────────────────
networks:
  shopverse-net:
    driver: bridge